<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>q7</title>
  <link rel="stylesheet" href="q7.css">
</head>
<body>
  <form id="regForm" class="form-container">
    <h2>Student Registration</h2>
    
    <label>Username *</label>
    <input type="text" required placeholder="Enter username">

    <label>Email *</label>
    <input type="email" required placeholder="Enter email">

    <label>Password *</label>
    <input type="password" required placeholder="Enter password">

    <label>Age *</label>
    <input type="number" id="ageInput" required placeholder="Enter age">
    <div id="ageAlert" class="alert-box">Warning: Age is less than 16</div>

    <label>Gender</label>
    <div class="radio-group">
      <input type="radio" name="gender" value="male"> Male
      <input type="radio" name="gender" value="female"> Female
    </div>

    <label>Course</label>
    <select>
      <option value="web">Web Development</option>
      <option value="design">Graphic Design</option>
      <option value="data">Data Science</option>
    </select>

    <div class="checkbox-group">
      <input type="checkbox" required> I accept terms and conditions *
    </div>

    <button type="submit" class="submit-btn">Register</button>
  </form>

  <script src="q7.js"></script>
</body>
</html>
