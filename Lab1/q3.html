<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Third Question</title>
</head>
<body>
    <div>
        <h1>
            Student Registration Form
        </h1>
        <form action="" autocomplete="on" >
            <label for="fullname">Name:</label>
            <br>  
            <input type="text" name="fullname" id="fullname" placeholder="Enter your name" required pattern="[A-Za_z\s{3, 20}]">
            <br><br>
            <label for="email">Email:</label>
            <br>
            <input type="email" name="email" id="email" placeholder="Enter your email" title="Valid email contains @example.com">
            <br><br>
            <label for="password">Password:</label>
            <br>
            <input type="password" name="password" id="password">
            <br><br>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" step="3" min="16">
            <br><br>
            <label for="gender">Gender:</label>
            <input type="radio" name="gender" id="male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="other">
            <label for="other">Other</label>
            <br><br>
            <label for="course">Select Course:</label>
            <select name="course" id="course">
                <option value="">Select your course</option>
                <option value="AI">AI</option>
                <option value="WebDev">WebDev</option>
                <option value="ML">Machine Learning</option>
            </select>
            <br><br>
            <label for="hobbies">Hobbies:</label>
            <input type="checkbox" name="hobbies" id="reading">
            <label name="reading">Reading</label>
            <input type="checkbox" name="hobbies" id="driving">
            <label for="hobbies">Driving</label>
            <input type="checkbox" name="hobbies" id="swimming">
            <label for="swimming">Swimming</label>
            <br><br>
            <input type="checkbox" id="terms">
            <label for="terms">I accept the terms and conditions</label>

            <br><br>
            <button type="reset">Reset</button>
            <br><br>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
