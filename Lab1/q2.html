<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Question</title>
</head>
<body>
    <h1>
        Create a webpage that includes at least two hyperlinks using the <span id="atag"></span> tag. One link 
        should open in the same tab and the other should open in a new tab.
       
        <!-- To print a tag like <a> in html we can write it as &lt;a&gt; where &lt; = < and &gt; = >  -->
    </h1>
    <a href="https://www.google.com/" target="_self">Google in self</a>
    <br>
    <a href="https://www.wikipedia.org/" target="_blank">Wikipedia in other</a>
    <script>
        atag = "<a>"
        document.getElementById("atag").innerText = atag
    </script>
</body>
</html>
