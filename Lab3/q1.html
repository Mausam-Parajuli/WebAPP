

<!-- Create a site that needs to have two buttons;
one for adding an item into the list and another for removing the last item from the list.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q1</title>
    <link rel="stylesheet" href="q1.css">
</head>
<body>
    <div class="container">
    <h2>Dynamic List Controller</h2>

    <button class="add-btn" onclick="showInput()">Add Item</button>
    <button class="remove-btn" onclick="removeLastItem()">Remove Last Item</button>

    <div class="input-section" id="inputSection">
        Type an item to insert into List:
        <input type="text" id="itemInput">
        <button onclick="addItem()">Submit</button>
    </div>

    <ul id="itemList"></ul>
</div>
    <script src="q1.js"></script>
    
</body>
</html>
