<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic List Controller</title>
    <style>
        body
        {
            /* display: flex;
            flex-direction: column;
            align-items: center; */
            justify-content: center;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        #add
        {
            background-color: greenyellow;
            border-color: black;
            border-radius: 5px;  
            padding: 5px; 
        }

        #remove
        {
            background-color: rgb(255, 47, 47);
            border-color: black;
            border-radius: 5px;  
            padding: 5px;
        }

        #inputTask
        {
            padding: 20 px;
            margin: 10 px;
            border-color: rgb(115, 217, 13);
            display: block;
        }
    </style>
</head>
<body>
    <div>
        <h1>Dynamic List Controller</h1>
    </div>
    <div>
        <button id="add">Add Item</button>
        <button id="remove">Remove last Item</button>
    </div>
    <input type="text" id="inputTask" placeholder="Enter a task">
    <ul id="list">

    </ul>
    <script src="controller.js"></script>
</body>
</html>
